<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        main {
            background-color: #ffffff;
            padding: 0 4.125rem;
            /* 66px */
        }

        .hero-section {
            padding-top: 1rem;
            /* 40px */
        }

        .hero-card {
            /* Image Background Logic */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgb(16, 13, 13);
            /*background-image: linear-gradient(rgba(72, 143, 182, 0.4), rgba(0, 0, 0, 0.4)), url('/images/');*/
            border-radius: 0.9375rem;
            /* 15px */
            padding: 5rem;
            /* 80px 60px */
            padding-top: 1rem;
            padding-left: 8rem;
            min-height: 20rem;
            /* 400px */
            display: flex;
            flex-direction: column;
            /*Keep them in a single column */
            justify-content: center;
            /* Center them in middle region of screen */
        }

        .hero-heading {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Add market sans font */
            font-size: 3rem;
            /* 72px */
            font-weight: bold;
            margin-bottom: 0.9375rem;
            /* 15px */
            color: #ffffff;
        }

        .hero-subtext {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 28.125rem;
            /* 450px */
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1.5625rem;
            /* 25px */
            margin-top: -0.5rem;
            font-size: 1.1rem;
            /* 14px */
        }

        .hero-shop-btn {
            background-color: #ffffff;
            /* Changed to white button for better aesthetic on images */
            color: #333;
            border: none;
            padding: 0.75rem 1.5625rem;
            /* 12px 25px */
            border-radius: 1.5625rem;
            /* 25px */
            width: fit-content;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .hero-shop-btn:hover {
            background-color: #d0d0d0;
            /*Add color scheme of website*/
            transform: translateY(-0.125rem);
            /* 2px lift */
        }

        .categories{
            width: 100%;
            padding: 3rem 0;
            /* 48px 0 */
            overflow: hidden; /* Hide scrollbars, important for marquee */
        }

        .categories h2{
            font-family:'Times New Roman', Times, serif;
            font-size: 2rem;
            /* 32px */
            font-weight: bold;
            font-style: italic;
            margin-bottom: 2rem; /* 32px */
            /* 8px */
            text-align: center;
        }

        .track-player{
            position: relative; /* For absolute positioning of track */
            overflow: hidden; /* Hide scrollbars */
        }

        .track-player::before, .track-player::after{
            content: ""; /*Mainly for gradient overlays for fade effect */
            position: absolute;
            top: 0;
            bottom: 0;
            width: 10%;
            height: 100%;
            z-index: 2; /* Ensure they are above the track for a proper fade */
            pointer-events: none; /* Allow clicks to pass through */
        }

        .track-player::before{
            left: 0;
            background: linear-gradient(to right, #f7f4ef, transparent);
        }

        .track-player::after{
            right: 0;
            background: linear-gradient(to left, #f7f4ef, transparent);
        }

        .track:hover {
            animation-play-state: paused; /* Pause the marquee on hover*/
        } 
        
        @keyframes scroll {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }

        .card {
            cursor: pointer;
            text-decoration: none;
            color: inherit; /* Inherit text color from parent, optional for now */
            width:14rem;/* 224px */
        }

        .card-img{
            width: 14rem;
            height: 14rem;
            border-radius:1.129rem; /* 18px */
            background: gray; /* Placeholder color, replace with actual image in JS */
            transition: transform 0.3s cubic bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease; /* Smooth hover effect */ 
        }

        .card:hover .card-img {
            transform: translateY(-0.25rem); /* 4px lift on hover, same as Shop Now button*/
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
        }

        .card p{
            margin-top: 0.5rem; /* 8px */
            font-size: 1rem; /* 16px */
            text-align: center;
            color: black;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="/images/Logo.jpg" alt="Logo" width="150rem" height="90remm "></img></div>
        <nav>
            <ul class="nav-links">
                <li class="search-bar">
                    <input type="text" id="search" placeholder="Search...">
                </li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="">Notification</a></li>
                <li><a href="#">Cart</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <main class="hero-section">
        <div class="hero-card">
            <h1 class="hero-heading">Welcome to Haven</h1>
            <p class="hero-subtext">
                Discover amazing products at unbeatable prices.
            </p>
            <button class="hero-shop-btn">
                <a href="/pages/" style="text-decoration:none;color:black;">Shop Now</a>
                <!--Make sure to link to products page-->
            </button>
        </div>
    </main>

    <section class="categories">
        <div class="categories-text">
            <h2>Best Deals</h2>
            <div class="categories-header">
                <p>Explore the top categories</p>
            </div>
        </div>

        <div class="track-player">
            <div class="track" id="track"></div> <!--Call track for JS-->
        </div>
    </section>

    <script>
        const categories = ['Electronics', 'Furniture', 'Generators', 'Watches', 'Laptops', 'Health & Beauty', 'Headphones', 'TVs'];
        const track = document.getElementById('track'); // Track is the element ID from track class

        [...categories, ...categories].forEach(name => {
            track.innerHTML += `
                <a class="card" href="/pages/${name.toLowerCase()}.html">
                    <div class="card-img" style="background-image: url('/images/${name.toLowerCase()}.jpg');"></div>
                    <p>${name}</p>
                </a>
            `;
        });
    </script>

</body>

</html>
