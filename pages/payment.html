<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Haven</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .body {
            background: rgb(120, 120, 120);
        }

        .payment-container {
            display: flex;
            min-height: 94vh;
        }

        .left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            background: rgb(79, 69, 217);
        }

        /* Payment Card */
        .payment-card {
            background: rgb(255, 255, 255);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .payment-form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }

        .payment-form h2 {
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Payment icons */
        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .payment-icon {
            height: 36px;
            width: auto;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .payment-icon:hover {
            transform: translateY(-2px);
        }

        /* Form fields */

        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.9rem;
            color: #333;
        }

        .field input {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.96rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .field input:focus {
            border-color: #0077cc;
        }

        .field-row .field:first-child {
            /* Expiry date field */
            flex: 2;
            /* Expiry date gets more space than CVV */
        }

        .field-row .field:last-child {
            flex: 1;
        }

        .payment-form input {
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 0.7rem;
            margin-top: 16px;
            background: rgb(255, 255, 255);
            color: rgb(53, 53, 53);
            border: 1px solid #737373;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .btn:hover {
            background: #3a4246;
            color: white;
        }

        /* Expiry and CVV fields in a row */

        .field-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn-play {
            width: 240px;
            padding: 0.7rem;
            margin-top: 16px;
            background: rgb(54, 54, 205);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .btn-play:hover {
            background: #3a4246;
        }

        .divider {
            width: 1px;
            background: #ddd;
            margin: 0 2rem;
        }

        /*Right Side*/

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: -3rem;
            gap: 1.5rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .or-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #cd3232;
        }

        .game-text {
            font-size: 1.1rem;
            color: #555;
            text-align: center;
            line-height: 1.6;
            width: 340px;
        }

        .game-img {
            width: 340px;
            height: 260px;
            background: url('../images/Payment/game.webp') center/cover no-repeat;
            border-radius: 8px;
        }

        footer {
            padding: 16px;
            text-align: center;
            font-size: 14px;
            border-top: #ddd 1px solid;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body>

    <main>

        <div class="payment-container">

            <div class="left">
                <div class="payment-card">
                    <span style="cursor: pointer; text-decoration: underline; color: rgb(44, 44, 215);" onclick="window.history.back()">Go back</span>
                    <form class="payment-form" id="PaymentForm">

                        <h2>Payment Method</h2>

                        <div class="payment-icons">
                            <img class="payment-icon"
                                src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                alt="Mastercard">
                            <img class="payment-icon"
                                src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg" alt="Bitcoin">
                            <img class="payment-icon"
                                src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                        </div>

                        <div class="field">
                            <label for="card-number">Card Number</label>
                            <input type="text" id="card-number" placeholder="5600 - 0000 - 1111 - 222" required>
                        </div>

                        <div class="field">
                            <label for="card-holder-name">Card Holder Name</label>
                            <input type="text" id="card-holder-name" placeholder="Kenneth Cole" required>
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label for="expiry-date">Expiry Date</label>
                                <input type="text" id="expiry-date" placeholder="MM/YY" required>
                            </div>
                            <div class="field">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" placeholder="179" required>
                            </div>
                        </div>

                        <button type="submit" class="btn" onclick="paymentAlert()">Pay!</button>

                    </form>
                </div>
            </div>

            <div class="right">
                <span class="or-text">OR</span>
                <p class="game-text">Play this game and get a chance to win a discount voucher</p>
                <div class="game-img"></div>
                <button class="btn-play"><a href="https://rujalrazz.github.io/mini-game-portal/index.html"
                        style="text-decoration: none; color:white; font-size:1rem;">Play now</a></button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>
            Copyright &copy; 2026 Haven. All Rights Reserved.
            <a href="#" class="copyright">Accessibility</a>,
            <a href="#" class="copyright">User Agreement</a>,
            <a href="#" class="copyright">Privacy</a>,
            <a href="#" class="copyright">Consumer Health Data</a>,
            <a href="#" class="copyright">Payments Terms of Use</a>,
            <a href="#" class="copyright">Cookies</a>,
            <a href="#" class="copyright">CA Privacy Notice</a>.
        </p>
    </footer>

    <script src="../javascript/script.js"></script>

</body>

</html>
