<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Haven</title>
    <style>
        .payment-container {
            display: flex;
            min-height: 80vh;
        }

        .right {
            border-left: #ddd 1px solid;
        }

        .left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .payment-form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .payment-form h2 {
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Payment icons */
        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .payment-icon {
            height: 36px;
            width: auto;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .payment-icon:hover {
            transform: translateY(-2px);
        }

        /* Form fields */

        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.9rem;
            color: #333;
        }

        .field input {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.96rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .field input:focus {
            border-color: #0077cc;
        }

        /* Expiry and CVV fields in a row */

        .field-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .field-row .field:first-child {
            flex: 2;
        }

        .field-row .field:last-child {
            flex: 1;
        }

        .btn-play {
            width: 95%;
            padding: 0.7rem;
            margin-top: 16px;
            background: #4b5256;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .btn-play:hover {
            background: #3a4246;
        }

        .divider {
            width: 1px;
            background: #ddd;
            margin: 0 2rem;
        }

        /*Right Side*/

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        .or-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }

        .game-text {
            font-size: 0.95rem;
            color: #555;
            text-align: center;
            line-height: 1.6;
            max-width: 220px;
        }

        .game-img {
            width: 200px;
            height: 120px;
            background: url('../images/Payment/game.webp') center/cover no-repeat;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <main>
        <div class="payment-container">

            <div class="left">
                <form class="payment-form" id="PaymentForm">

                    <h2 style="text-align: center;">Payment Method</h2>

                    <div class="payment-icons">
                        <img class="payment-icon"
                            src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                            alt="Mastercard">
                        <img class="payment-icon" src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg"
                            alt="Bitcoin">
                        <img class="payment-icon" src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
                            alt="PayPal">
                    </div>

                    <div class="field">
                        <label for="card-number">Card Number</label>
                        <input type="text" id="card-number" placeholder="5600 - 0000 - 1111 - 222" required>
                    </div>

                    <div class="field">
                        <label for="card-holder-name">Card Holder Name</label>
                        <input type="text" id="card-holder-name" placeholder="Kenneth Cole" required>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label for="expiry-date">Expiry Date</label>
                            <input type="text" id="expiry-date" placeholder="MM/YY" required>
                        </div>

                        <div class="field">
                            <label for="cvv" style="width: 360px;">CVV :</label>
                            <input type="text" id="cvv" placeholder="179" required>
                        </div>
                    </div>

                    <button type="submit" class="btn">Pay!</button>
            </div>
            </form>

            <div class="right">
                <span class="or-text">OR</span>
                <p class="game-text">Play this game and get a chance to win a discount voucher</p>
                <div class="game-img"></div>
                <button class="btn-play">Play now</button>
            </div>

        </div>
    </main>

</body>

</html>
