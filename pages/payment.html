<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Haven</title>
    <style>
        .payment-container {
            display: flex;
            min-height: 80vh;
            gap: 20px;
        }

        .right {
        }

        .left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: #ddd 1px solid;
        }

        .payment-form {
            width: 80%;
            max-width: 400px;
        }

        .payment-form h2 {
            margin-bottom: 1rem;
        }

        .payment-form label {
            display: block;
            margin-top: 16px;
        }

        .payment-form input[type="text"]{
            width: 90%;
            padding: 8px;
            margin-top: 0.3rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .form-container {
            display: flex;
            flex-direction: column;
        }

        .checkbox {
            margin-top: 16px;
        }

        .btn {
            width: 95%;
            padding: 0.7rem;
            margin-top: 16px;
            background: #4b5256;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <main>
        <div class="payment-container">

            <div class="left">
                <form class="payment-form" id="PaymentForm">

                    <div class="form-container">
                        <h2 style="text-align: center;">Payment Method</h2>

                        <label for="card-number">Card Number</label>
                        <input type="text" id="card-number" placeholder="5600 - 0000 - 1111 - 222" required>

                        <label for="card-holder-name">Card Holder Name</label>
                        <input type="text" id="card-holder-name" placeholder="Kenneth Cole" required>

                        <label for="expiry-date">Expiry Date</label>
                        <input type="text" id="expiry-date" placeholder="MM/YY" required>

                        <label for="cvv" style="width: 360px;">CVV :</label>
                        <input type="text" id="cvv" placeholder="179" required>

                        <button type="submit" class="btn">Pay!</button>
                    </div>
                </form>
            </div>

            <div class="right">

            </div>

        </div>
    </main>

</body>

</html>
